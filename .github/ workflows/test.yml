name: Test

on: [push]


jobs:
  test:
    #где запускаем
    runs-on: ubuntu-latest
    #Что делаем
    steps:
      #Выкачиваем репозиторий
      - uses: actions/checkout@v4
      #Настраиваем Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'
      - uses: Xotabu4/selenoid-github-action@v2
      #Запускаем тесты
      - run: ./gradlew clean test -Dselenide.remote=http://localhost:4444/wd/hub